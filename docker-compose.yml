version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: localdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.22.0
    restart: unless-stopped
    environment:
      POSTGRESDB: nakama
      POSTGRESPASSWORD: localdb
      RUNTIME_PATH: /tmp/modules
      # Add if SSL issues: PGSSLMODE: disable
    command:
      - sh
      - -c
      - |
        mkdir -p /tmp/modules &&
        echo "$$MAIN_JS_B64" | base64 -d > /tmp/modules/main.js &&
        nakama migrate up --database.address postgres:localdb@postgres:5432/nakama &&
        exec nakama --name nakama1 \
          --database.address postgres:localdb@postgres:5432/nakama \
          --socket.port 7350 \
          --console.port 7351 \
          --http.port 7349 \
          --runtime.path /tmp/modules \
          --runtime.js_entrypoint main.js
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7349:7349"   # HTTP/REST
      - "7350:7350"   # WebSocket/Match
      - "7351:7351"   # Console
    volumes:
      - ./backend/build:/tmp/modules:ro  # Fallback if B64 fails

volumes:
  pgdata:
